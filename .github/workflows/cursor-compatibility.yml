name: Cursor Compatibility

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Repository path to smoke after checkout"
        default: "."
        required: false
      level:
        description: "Smoke level"
        default: "real"
        required: false
        type: choice
        options:
          - quick
          - real
          - full

jobs:
  cursor-compatibility:
    name: Private Cursor compatibility lane
    runs-on: macos-latest
    env:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      CURSOR_BACKGROUND_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      CURSOR_AGENT_INSTALL_COMMAND: ${{ secrets.CURSOR_AGENT_INSTALL_COMMAND }}
      HERMES_CURSOR_HARNESS_SDK_RUNTIME: local
      HERMES_CURSOR_HARNESS_SDK_SANDBOX_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Require private Cursor API key
        run: |
          if [ -z "${CURSOR_API_KEY:-}" ]; then
            echo "CURSOR_API_KEY secret is required for this private compatibility lane."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install package
        run: python -m pip install -e ".[dev,release]"

      - name: Optional Cursor CLI install
        run: |
          if [ -n "${CURSOR_AGENT_INSTALL_COMMAND:-}" ]; then
            eval "$CURSOR_AGENT_INSTALL_COMMAND"
          else
            echo "CURSOR_AGENT_INSTALL_COMMAND is not set; assuming Cursor CLI is already available."
          fi

      - name: Validate config
        run: |
          hermes-cursor-harness config validate \
            --project "${{ inputs.project || '.' }}" \
            --no-sdk-status

      - name: Install Cursor SDK bridge dependencies
        run: hermes-cursor-harness sdk install --timeout-sec 180

      - name: Cursor SDK status
        run: hermes-cursor-harness sdk status

      - name: Cursor SDK catalog auth check
        run: hermes-cursor-harness sdk models

      - name: Compatibility matrix run
        run: |
          hermes-cursor-harness compatibility run \
            --level "${{ inputs.level || 'real' }}" \
            --project "${{ inputs.project || '.' }}" \
            --include-sdk \
            --timeout-sec 180

      - name: Upload compatibility matrix
        uses: actions/upload-artifact@v4
        with:
          name: cursor-compatibility-matrix
          path: ~/.hermes/cursor_harness/compatibility_matrix.json
