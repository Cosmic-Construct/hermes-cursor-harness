name: hermes-cursor-harness
version: "0.1.0"
description: Hermes-native Cursor harness with Cursor SDK-first execution, ACP fallback, and stream-json fallback.
author: Hermes Cursor Harness contributors
license: MIT
toolsets:
  - cursor_harness
skills:
  - skills/cursor-harness.md
env:
  optional:
    - HERMES_CURSOR_HARNESS_CONFIG
    - HERMES_CURSOR_HARNESS_TRANSPORT
    - HERMES_CURSOR_HARNESS_SDK_COMMAND
    - HERMES_CURSOR_HARNESS_SDK_RUNTIME
    - HERMES_CURSOR_HARNESS_SDK_PACKAGE
    - HERMES_CURSOR_HARNESS_SDK_CLOUD_REPOSITORY
    - HERMES_CURSOR_HARNESS_SDK_CLOUD_REF
    - HERMES_CURSOR_HARNESS_ACP_COMMAND
    - HERMES_CURSOR_HARNESS_STREAM_COMMAND
    - HERMES_CURSOR_HARNESS_HOME
